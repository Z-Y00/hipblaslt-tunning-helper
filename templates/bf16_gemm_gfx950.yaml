TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201]

GlobalParameters:
  SkipSlowSolutionRatio: 0.5
  NumElementsToValidate: 128
  NumWarmups: 20
  NumBenchmarks: 1
  SyncsPerBenchmark: 1
  EnqueuesPerSync: 30
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  RotatingBufferSize: 512
  SleepPercent: 0
  PrintLevel: 1
  PrintSolutionRejectionReason: True
  CMakeBuildType: Release
  MergeFiles: False
  KernelTime: True
  MaxWorkspaceSize: 13421772800
  DataInitTypeA: 3
  DataInitTypeB: 3
  DataInitTypeAlpha: 1
  DataInitTypeBeta: 0
  DataInitTypeScaleAlphaVec: 1
  DataInitTypeScaleA: 1
  DataInitTypeScaleB: 1
  MinKForGSU: 1
  BoundsCheck: 2
  MaxLDS: 163840
  DeviceLDS: 163840
  KeepBuildTmp: True

BenchmarkProblems:

  ########################################
  # BF16 TN — standard GEMM
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      Batched: True
      UseBias: 0
    - # BenchmarkProblemSizeGroup
      InitialSolutionParameters:
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      ForkParameters:
        - MatrixInstruction:
          - [32, 32, 16, 1]
          - [16, 16, 32, 1]
        - PrefetchGlobalRead: [2]
        - PrefetchLocalRead: [1]
        - DepthU: [32, 64]
        - LocalReadVectorWidth: [-1]
        - ScheduleIterAlg: [3]
        - TransposeLDS: [0, 1]
        - LdsBlockSizePerPadA: [-1]
        - LdsBlockSizePerPadB: [-1]
        - LdsPadA: [-1]
        - LdsPadB: [-1]
        - NonTemporalB: [0, 4]
        - StaggerU: [0]
        - StaggerUStride: [16]
        - WorkGroupMappingXCC: [1, 8]
        - WorkGroupMappingXCCGroup: [-1]
        - 1LDSBuffer: [-1]
        - GlobalSplitU: [1]
        - SourceSwap: [1]
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Exact: [4096, 4096, 1, 4096]
